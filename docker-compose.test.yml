version: '3.8'

services:
  notes-flow-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: notes-flow-test
    environment:
      - COVERAGE_THRESHOLD=${COVERAGE_THRESHOLD:-80}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://127.0.0.1:8080/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-unsloth/Qwen3.5-35B-A3B}
    volumes:
      - ./:/app
      - /share/services/notes-flow/data:/app/data
      - /share/services/notes-flow/logs:/app/logs
    network_mode: host
    depends_on:
      notes-flow:
        condition: service_healthy
    entrypoint: ["/app/pre-deploy.sh"]
    restart: "no"

  notes-flow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notes-flow-local
    volumes:
      - /share/services/notes-flow/data:/app/data
      - /share/services/notes-flow/logs:/app/logs
    network_mode: host
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OLLAMA_BASE_URL=http://127.0.0.1:8080
      - OLLAMA_MODEL=unsloth/Qwen3.5-35B-A3B
      - DEFAULT_SUMMARIZE_DELAY=300
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
