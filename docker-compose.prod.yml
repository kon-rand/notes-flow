version: '3.8'

services:
  notes-flow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notes-flow-prod
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://127.0.0.1:8080/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-unsloth/Qwen3.5-35B-A3B}
      - DEFAULT_SUMMARIZE_DELAY=${DEFAULT_SUMMARIZE_DELAY:-300}
    restart: always
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - notes-flow-data:/app/data

volumes:
  notes-flow-data: